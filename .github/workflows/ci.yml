name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run conformance

  # The native verifiers each load conformance/vectors.json + interop.json and must
  # reproduce every verdict + handshake, cross-verifying TS-minted ed25519 signatures.
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test ./...
        working-directory: go

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install cryptography pytest
      - run: python -m pytest -q
        working-directory: python

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo test
        working-directory: rust
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: rust

  c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libsodium-dev
      # Use the system libsodium (the vendored MinGW build is Windows-only, gitignored).
      - run: make SODIUM_INC= SODIUM_LIB= LDLIBS=-lsodium test
        working-directory: c

  # Cross-LANGUAGE interop over a real socket: start the TS disclosure server on a
  # port, then point the Go and Python verify-url clients at it and assert each exits
  # 0. This proves a TS-minted, ed25519-signed disclosure served over HTTP verifies
  # in three runtimes against one live origin (the TS leg is scripts/crossProcess.ts).
  cross-process:
    runs-on: ubuntu-latest
    env:
      PORT: "8799"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: npm ci
      - run: pip install cryptography
      - run: go build -o verify-url ./cmd/verify-url
        working-directory: go
      - run: cargo build --bin verify-url
        working-directory: rust
      # Start the disclosure server in the background, then wait for the socket.
      - name: Start disclosure server
        run: |
          node --import tsx scripts/serveDisclosure.ts "$PORT" &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:$PORT/.well-known/agent-disclosure" >/dev/null; then
              echo "server ready"; exit 0
            fi
            sleep 0.5
          done
          echo "server did not become ready"; exit 1
      - name: TypeScript leg (real socket)
        run: node --import tsx scripts/crossProcess.ts
      - name: Go verify-url leg
        run: ./go/verify-url "http://localhost:$PORT"
      - name: Python verify_url leg
        run: python python/verify_url.py "http://localhost:$PORT"
      - name: Rust verify-url leg
        run: ./rust/target/debug/verify-url "http://localhost:$PORT"
      - name: Stop disclosure server
        if: always()
        run: kill "$SERVER_PID" || true

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Install mdBook from its prebuilt binary instead of a Node-based action — the
      # released peaceiris/actions-mdbook@v2 still runs on Node 20 (only its unreleased
      # main is Node 24), and this avoids the runtime dependency entirely.
      - name: Install mdBook (latest prebuilt binary)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/.local/bin"
          tag="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mdbook" --version
      - run: mdbook build docs
